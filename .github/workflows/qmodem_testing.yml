name: "QModem Testing - aarch64_generic"
on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build_openwrt24:
    name: "OpenWrt 24.10 (IPK) - aarch64_generic"
    runs-on: ubuntu-latest
    env:
      SDK_NAME: openwrt-sdk-24.10.4-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64
      SDK_EXT: tar.xz
      SDK_URL: https://downloads.openwrt.org/releases/24.10.4/targets/armsr/armv8/
      SDK_ARCH: aarch64_generic
    steps:
      - name: Install packages
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install zstd build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-venv rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: 'qmodem'

      - name: Cache openwrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: openwrt-sdk-24.10.4-armsr-armv8-testing-v2

      - name: Download and setup SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.SDK_URL }}${{ env.SDK_NAME }}.${{ env.SDK_EXT }}
          mkdir sdk && tar -xvf ${{ env.SDK_NAME }}.${{ env.SDK_EXT }} -C ./sdk --strip-components=1
          cd sdk
          echo "src-git base https://github.com/openwrt/openwrt.git;openwrt-24.10" > feeds.conf
          echo "src-git packages https://github.com/openwrt/packages.git;openwrt-24.10" >> feeds.conf
          echo "src-git luci https://github.com/openwrt/luci.git;openwrt-24.10" >> feeds.conf
          echo "src-git routing https://git.openwrt.org/feed/routing.git;openwrt-24.10" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make download -j$(nproc) || true

      - name: Setup QModem feed and compile
        id: compile
        run: |
          cd sdk
          # Remove stale qmodem feed if cached
          sed -i '/qmodem/d' feeds.conf
          echo "src-link qmodem $(pwd)/../qmodem" >> feeds.conf
          ./scripts/feeds update qmodem
          ./scripts/feeds install -a -p qmodem

          # Configure
          echo "CONFIG_ALL_NONSHARED=n" > .config
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_ALL=n" >> .config
          echo "CONFIG_AUTOREMOVE=n" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem-next=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem_USE_TOM_CUSTOMIZED_QUECTEL_CM=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_generic-qmi-wwan=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem-sms=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-lpac-manager=m" >> .config
          echo "CONFIG_PACKAGE_qmodem=m" >> .config
          echo "CONFIG_PACKAGE_qmodem-esim-bot=m" >> .config
          echo "CONFIG_PACKAGE_lpac=m" >> .config
          echo "CONFIG_PACKAGE_tom_modem=m" >> .config
          echo "CONFIG_PACKAGE_tom_modem_EARLY_RETURN=y" >> .config
          echo "CONFIG_PACKAGE_tom_modem_ENABLE_UBUS_DAEMON=y" >> .config
          echo "CONFIG_PACKAGE_quectel-CM-5G-M=m" >> .config
          echo "CONFIG_PACKAGE_ubus-at-daemon=m" >> .config
          echo "CONFIG_PACKAGE_sms_forwarder=m" >> .config
          make defconfig

          # Compile all packages
          packages="luci-app-qmodem luci-app-qmodem-sms luci-app-qmodem-next luci-app-lpac-manager qmodem qmodem-esim-bot"
          arch_packages="tom_modem quectel_CM_5G ubus_at_daemon sms_forwarder lpac"

          for package in $packages; do
            echo "=== Compiling $package ==="
            make package/$package/compile -j$(nproc) V=s 2>&1 | tail -5 || echo "WARNING: $package compile issue"
          done

          for package in $arch_packages; do
            echo "=== Compiling $package ==="
            make package/$package/compile -j$(nproc) V=s 2>&1 | tail -5 || echo "WARNING: $package compile issue"
          done

          echo "=== Build output ==="
          ls bin/packages/${{ env.SDK_ARCH }}/qmodem/ 2>/dev/null || echo "No packages in qmodem feed"
          ls bin/packages/${{ env.SDK_ARCH }}/base/ 2>/dev/null | head -20 || true

          echo "status=success" >> $GITHUB_OUTPUT
          echo "FIRMWARE=$(pwd)/bin/packages/${{ env.SDK_ARCH }}/qmodem/" >> $GITHUB_ENV

      - name: Verify patches
        run: |
          echo "=== Verifying Intel L850/L860 patches ==="
          grep -q "AT+XDATACHANNEL" qmodem/application/qmodem/files/usr/share/qmodem/modem_dial.sh && echo "✅ NCM data channel binding" || exit 1
          grep -q '"intel"' qmodem/application/qmodem/files/usr/share/qmodem/vendor/fibocom.sh && echo "✅ Intel platform in fibocom.sh" || exit 1
          grep -q '"l850-gl"' qmodem/application/qmodem/files/usr/share/qmodem/modem_support.json && echo "✅ L850-GL in modem_support.json" || exit 1
          grep -q 'AT+XACT' qmodem/application/qmodem/files/usr/share/qmodem/vendor/fibocom.sh && echo "✅ AT+XACT band locking" || exit 1
          grep -q 'ip_change_intel' qmodem/application/qmodem/files/usr/share/qmodem/modem_dial.sh && echo "✅ Intel IP change handler" || exit 1
          echo "=== All patches verified ==="

      - name: Run unit tests
        run: |
          cd qmodem
          bash tests/test_intel_json_registry.sh
          bash tests/test_intel_match_config.sh
          bash tests/test_intel_mode.sh
          bash tests/test_intel_signal.sh

      - name: Upload packages
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: QModem-OpenWrt24-aarch64_generic-ipk
          path: |
            sdk/bin/packages/${{ env.SDK_ARCH }}/qmodem/*
          retention-days: 14

  build_openwrt25:
    name: "OpenWrt 25.12 (APK) - aarch64_generic"
    runs-on: ubuntu-latest
    env:
      SDK_NAME: openwrt-sdk-25.12.4-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64
      SDK_EXT: tar.zst
      SDK_URL: https://downloads.openwrt.org/releases/25.12.4/targets/armsr/armv8/
      SDK_ARCH: aarch64_generic
    steps:
      - name: Install packages
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install zstd build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-venv rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: 'qmodem'

      - name: Cache openwrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: openwrt-sdk-25.12.4-armsr-armv8-testing-v2

      - name: Download and setup SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.SDK_URL }}${{ env.SDK_NAME }}.${{ env.SDK_EXT }}
          mkdir sdk && tar --zstd -xvf ${{ env.SDK_NAME }}.${{ env.SDK_EXT }} -C ./sdk --strip-components=1
          cd sdk
          echo "src-git base https://github.com/openwrt/openwrt.git;openwrt-25.12" > feeds.conf
          echo "src-git packages https://github.com/openwrt/packages.git;openwrt-25.12" >> feeds.conf
          echo "src-git luci https://github.com/openwrt/luci.git;openwrt-25.12" >> feeds.conf
          echo "src-git routing https://git.openwrt.org/feed/routing.git;openwrt-25.12" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make download -j$(nproc) || true

      - name: Setup QModem feed and compile
        id: compile
        run: |
          cd sdk
          # Remove stale qmodem feed if cached
          sed -i '/qmodem/d' feeds.conf
          echo "src-link qmodem $(pwd)/../qmodem" >> feeds.conf
          ./scripts/feeds update qmodem
          ./scripts/feeds install -a -p qmodem

          # Configure
          echo "CONFIG_ALL_NONSHARED=n" > .config
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_ALL=n" >> .config
          echo "CONFIG_AUTOREMOVE=n" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem-next=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem_USE_TOM_CUSTOMIZED_QUECTEL_CM=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_generic-qmi-wwan=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem-sms=m" >> .config
          echo "CONFIG_PACKAGE_luci-app-lpac-manager=m" >> .config
          echo "CONFIG_PACKAGE_qmodem=m" >> .config
          echo "CONFIG_PACKAGE_qmodem-esim-bot=m" >> .config
          echo "CONFIG_PACKAGE_lpac=m" >> .config
          echo "CONFIG_PACKAGE_tom_modem=m" >> .config
          echo "CONFIG_PACKAGE_tom_modem_EARLY_RETURN=y" >> .config
          echo "CONFIG_PACKAGE_tom_modem_ENABLE_UBUS_DAEMON=y" >> .config
          echo "CONFIG_PACKAGE_quectel-CM-5G-M=m" >> .config
          echo "CONFIG_PACKAGE_ubus-at-daemon=m" >> .config
          echo "CONFIG_PACKAGE_sms_forwarder=m" >> .config
          make defconfig

          # Compile all packages
          packages="luci-app-qmodem luci-app-qmodem-sms luci-app-qmodem-next luci-app-lpac-manager qmodem qmodem-esim-bot"
          arch_packages="tom_modem quectel_CM_5G ubus_at_daemon sms_forwarder lpac"

          for package in $packages; do
            echo "=== Compiling $package ==="
            make package/$package/compile -j$(nproc) V=s 2>&1 | tail -5 || echo "WARNING: $package compile issue"
          done

          for package in $arch_packages; do
            echo "=== Compiling $package ==="
            make package/$package/compile -j$(nproc) V=s 2>&1 | tail -5 || echo "WARNING: $package compile issue"
          done

          echo "=== Build output ==="
          find bin/ -name "*.apk" -path "*/qmodem/*" 2>/dev/null | sort || echo "No APK packages found"
          find bin/ -name "*.apk" -path "*/base/*" 2>/dev/null | head -10 || true

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Verify patches
        run: |
          echo "=== Verifying Intel L850/L860 patches ==="
          grep -q "AT+XDATACHANNEL" qmodem/application/qmodem/files/usr/share/qmodem/modem_dial.sh && echo "✅ NCM data channel binding" || exit 1
          grep -q '"intel"' qmodem/application/qmodem/files/usr/share/qmodem/vendor/fibocom.sh && echo "✅ Intel platform in fibocom.sh" || exit 1
          grep -q '"l850-gl"' qmodem/application/qmodem/files/usr/share/qmodem/modem_support.json && echo "✅ L850-GL in modem_support.json" || exit 1
          grep -q 'AT+XACT' qmodem/application/qmodem/files/usr/share/qmodem/vendor/fibocom.sh && echo "✅ AT+XACT band locking" || exit 1
          grep -q 'ip_change_intel' qmodem/application/qmodem/files/usr/share/qmodem/modem_dial.sh && echo "✅ Intel IP change handler" || exit 1
          echo "=== All patches verified ==="

      - name: Run unit tests
        run: |
          cd qmodem
          bash tests/test_intel_json_registry.sh
          bash tests/test_intel_match_config.sh
          bash tests/test_intel_mode.sh
          bash tests/test_intel_signal.sh

      - name: Upload packages
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: QModem-OpenWrt25-aarch64_generic-apk
          path: |
            sdk/bin/packages/${{ env.SDK_ARCH }}/qmodem/*
          retention-days: 14
